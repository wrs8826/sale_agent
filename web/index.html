<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>销售 Agent · 入口</title>
  <link rel="stylesheet" href="/assets/common.css">
  <style>
    main { align-items: stretch; }
    .panel-full { align-items: center; justify-content: center; gap: 4%; }
    .lead { text-align: center; max-width: 640px; }
    .lead h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      font-weight: 700;
      margin-bottom: 1.5%;
    }
    .lead p {
      font-size: 0.95rem;
      color: #777;
      line-height: 1.7;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3%;
      width: 100%;
      max-width: 800px;
      margin-top: 3%;
    }
    .card {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 6% 5%;
      text-decoration: none;
      color: inherit;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #fafbff;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: #4f7ef7;
      box-shadow: 0 8px 24px rgba(79,126,247,.12);
    }
    .card.admin { background: #fff8f4; }
    .card.admin:hover { border-color: #e67e22; box-shadow: 0 8px 24px rgba(230,126,34,.14); }
    .card.admin .arrow { color: #e67e22; }

    .card .ico { font-size: 2.4rem; line-height: 1; }
    .card .title { font-size: 1.15rem; font-weight: 700; color: #1a1a2e; }
    .card .desc { font-size: 0.86rem; color: #777; line-height: 1.7; }
    .card .badge {
      display: inline-block;
      align-self: flex-start;
      font-size: 0.7rem;
      padding: .1em .6em;
      border-radius: 3px;
      background: #eef2ff;
      color: #4f7ef7;
      font-weight: 600;
    }
    .card.admin .badge { background: #fff0e0; color: #e67e22; }
    .card .arrow {
      align-self: flex-end;
      color: #4f7ef7;
      font-size: 0.85rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <h1>销售 Agent · 入口</h1>
  <span class="tag">qwen3-max · text-embedding-v4 · 混合检索 · LangGraph 入库</span>
  <button id="btn-logout" style="margin-left:auto;padding:.35rem .9rem;font-size:.82rem;border:1px solid #dde;border-radius:6px;background:#fff;color:#555;cursor:pointer;">退出登录</button>
</header>

<script>
  document.getElementById('btn-logout').addEventListener('click', async () => {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  });
</script>

<main>
  <section class="panel-full">
    <div class="lead">
      <h1>请选择进入身份</h1>
      <p>用户端提供基础的上传与对话功能；<br>管理员端可调整检索参数、查看清洗细节、维护向量库。</p>
    </div>

    <div class="cards">
      <a class="card" href="/user">
        <span class="badge">用户</span>
        <div class="ico">👤</div>
        <div class="title">用户端</div>
        <div class="desc">上传销售对话或资料文档（自动清洗入库），与 Agent 对话获取知识库支持的回答。无参数调整。</div>
        <div class="arrow">进入 →</div>
      </a>
      <a class="card admin" href="/admin/knowledge">
        <span class="badge">管理员</span>
        <div class="ico">🛠️</div>
        <div class="title">管理员端</div>
        <div class="desc">完整测试功能：分块/检索参数调节、清洗过程可视化、向量库维护、RAG 检索调试与对话反馈管理。</div>
        <div class="arrow">进入 →</div>
      </a>
    </div>
  </section>
</main>

</body>
</html>
