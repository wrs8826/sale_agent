<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>销售 Agent · 管理员登录</title>
  <link rel="stylesheet" href="/assets/common.css">
  <style>
    body { background: #fff8f4; }
    main { align-items: center; justify-content: center; }

    .login-box {
      background: #fff;
      border: 1px solid #f0e0d0;
      border-radius: 14px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(230,126,34,.1);
    }

    .login-box .ico { text-align: center; font-size: 2.2rem; margin-bottom: .6rem; }

    .login-box h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.3rem;
      text-align: center;
    }

    .login-box .sub {
      text-align: center;
      font-size: 0.83rem;
      color: #aaa;
      margin-bottom: 2rem;
    }

    .badge-admin {
      display: block;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: #e67e22;
      background: #fff0e0;
      border-radius: 4px;
      padding: .15em .8em;
      width: fit-content;
      margin: 0 auto 1.6rem;
    }

    .field { margin-bottom: 1.1rem; }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #444;
      margin-bottom: .35rem;
    }

    .field input {
      width: 100%;
      box-sizing: border-box;
      padding: .6rem .85rem;
      border: 1px solid #e8ddd0;
      border-radius: 8px;
      font-size: .95rem;
      color: #222;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .field input:focus {
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230,126,34,.12);
    }

    .btn-login {
      width: 100%;
      padding: .7rem;
      background: #e67e22;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: .5rem;
      transition: background .15s, transform .1s;
    }

    .btn-login:hover { background: #cf6d17; }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { background: #f0c090; cursor: not-allowed; }

    .error-msg {
      color: #e74c3c;
      font-size: .83rem;
      margin-top: .8rem;
      text-align: center;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

<header>
  <h1>销售 Agent · 管理员端</h1>
  <span class="tag">知识库管理 · 参数调节 · RAG 调试</span>
</header>

<main>
  <div class="login-box">
    <div class="ico">🛠️</div>
    <h2>管理员登录</h2>
    <span class="badge-admin">仅限管理员账号</span>

    <div class="field">
      <label for="username">用户名</label>
      <input id="username" type="text" placeholder="管理员用户名" autocomplete="username">
    </div>

    <div class="field">
      <label for="password">密码</label>
      <input id="password" type="password" placeholder="管理员密码" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-login">登 录</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</main>

<script>
  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const btnLogin   = document.getElementById('btn-login');
  const errorMsg   = document.getElementById('error-msg');

  async function doLogin() {
    const username = usernameEl.value.trim();
    const password = passwordEl.value;
    if (!username || !password) {
      errorMsg.textContent = '请填写用户名和密码';
      return;
    }
    btnLogin.disabled = true;
    errorMsg.textContent = '';
    try {
      const res = await fetch('/auth/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errorMsg.textContent = data.error || '登录失败';
        return;
      }
      window.location.href = '/admin';
    } catch (e) {
      errorMsg.textContent = '网络错误，请重试';
    } finally {
      btnLogin.disabled = false;
    }
  }

  btnLogin.addEventListener('click', doLogin);
  [usernameEl, passwordEl].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
</script>

</body>
</html>
