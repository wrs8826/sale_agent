<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 对话 · 销售 Agent</title>
  <link rel="stylesheet" href="/assets/common.css">
  <style>
    /* ── 全屏双栏布局 ──────────────────────────────────────────────── */
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    main { flex: 1; min-height: 0; padding: 0; display: flex; overflow: hidden; }

    /* ── 会话侧栏（DeepSeek 风格） ───────────────────────────────── */
    .conv-sidebar {
      width: 240px; flex-shrink: 0;
      background: #f7f7f8;
      border-right: 1px solid #e8e8e8;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .conv-sidebar-top { padding: 12px 10px 8px; flex-shrink: 0; }
    .new-conv-btn {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 9px 14px;
      background: #4f7ef7; color: #fff;
      border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .new-conv-btn:hover { background: #3b6be0; }

    .conv-group-label {
      padding: 10px 12px 4px;
      font-size: 11px; font-weight: 600;
      color: #aaa; letter-spacing: .04em;
      text-transform: uppercase;
    }
    .conv-list { flex: 1; overflow-y: auto; padding: 4px 6px 8px; }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 99px; }

    .conv-item {
      display: flex; align-items: center;
      padding: 8px 10px; border-radius: 9px;
      cursor: pointer; position: relative;
      transition: background .12s; gap: 8px;
    }
    .conv-item:hover  { background: #ededef; }
    .conv-item.active { background: #e3e8f7; }
    .conv-item-info { flex: 1; min-width: 0; }
    .conv-item-title {
      font-size: 13px; color: #1f2937; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-item.active .conv-item-title { color: #3b5fc0; font-weight: 600; }
    .conv-item-date { font-size: 11px; color: #aaa; margin-top: 2px; }
    .conv-item-actions { display: none; gap: 2px; flex-shrink: 0; }
    .conv-item:hover .conv-item-actions { display: flex; }
    .conv-action-btn {
      width: 24px; height: 24px; border: none; background: none;
      border-radius: 6px; cursor: pointer; color: #aaa;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
    }
    .conv-action-btn:hover { background: #e0e0e0; color: #333; }
    .conv-action-btn.del:hover { background: #fee2e2; color: #dc2626; }
    .conv-empty { text-align: center; padding: 32px 12px; color: #bbb; font-size: 12px; line-height: 1.7; }
    .conv-rename-input {
      width: 100%; font-size: 13px; font-weight: 500;
      border: 1px solid #4f7ef7; border-radius: 5px;
      padding: 2px 6px; outline: none; background: #fff; color: #1f2937;
    }

    /* ── 主对话区 ────────────────────────────────────────────────── */
    .chat-main {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; overflow: hidden;
      background: #fff;
    }
    .chat-header {
      padding: 12px 20px 10px;
      border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .chat-header-left {}
    .chat-header-title { font-size: 14px; font-weight: 700; color: #111; }
    .chat-header-sub   { font-size: 11px; color: #aaa; margin-top: 2px; }

    .chat-msgs {
      flex: 1; overflow-y: auto;
      padding: 16px 20px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .chat-hint { font-size: 0.83rem; color: #ccc; text-align: center; padding: 10% 0; }

    .msg-wrap { display: flex; flex-direction: column; max-width: 80%; }
    .msg-wrap.user      { align-self: flex-end;   align-items: flex-end; }
    .msg-wrap.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: .65em .95em; border-radius: 13px;
      font-size: 0.9rem; line-height: 1.8;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-wrap.user .bubble      { background: #4f7ef7; color: #fff; border-bottom-right-radius: 4px; }
    .msg-wrap.assistant .bubble { background: #f4f4f4; color: #333; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 0.7rem; color: #ccc; margin-top: .3rem; }
    .tool-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      background: #fffbe6; border: 1px solid #ffe58f;
      border-radius: 4px; padding: .18em .55em;
      font-size: 0.72rem; color: #9a6e00; font-family: monospace;
      align-self: flex-start;
    }
    .tool-badge.result { background: #f0faf4; border-color: #b7e8ca; color: #2e7d4f; }
    .cursor::after { content: "▋"; animation: blink .7s step-start infinite; color: #4f7ef7; }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── 底栏 ────────────────────────────────────────────────────── */
    .chat-footer { border-top: 1px solid #f0f0f0; padding: 12px 20px 14px; flex-shrink: 0; }
    .param-row { margin-bottom: 10px; display: flex; align-items: center; gap: 1rem; }
    .param-row label { flex: 0 0 auto; font-size: 0.82rem; color: #555; }
    .param-row input[type=range] { flex: 1; accent-color: #4f7ef7; }
    .param-row .val { flex: 0 0 auto; font-size: 0.82rem; font-weight: 700; color: #4f7ef7; font-variant-numeric: tabular-nums; }

    .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
    .chat-input-row textarea {
      flex: 1; border: 1px solid #ddd; border-radius: 8px;
      padding: .65em .95em; font-size: 0.9rem; resize: none;
      outline: none; font-family: inherit; line-height: 1.55;
      transition: border-color .15s;
    }
    .chat-input-row textarea:focus { border-color: #4f7ef7; }
    .chat-input-row .btn { align-self: flex-end; }

    /* ── 反馈面板 ────────────────────────────────────────────────── */
    .feedback-panel {
      border-top: 1px dashed #eee; padding-top: 10px; margin-top: 10px;
      display: flex; flex-direction: column; gap: .7rem;
    }
    .feedback-title {
      font-size: 0.74rem; font-weight: 700; color: #aaa;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .feedback-title small { font-weight: normal; text-transform: none; letter-spacing: 0; color: #ccc; margin-left: .5rem; }
    .stars { display: flex; gap: .35rem; font-size: 1.4rem; user-select: none; line-height: 1; }
    .star { cursor: pointer; color: #e0e0e0; transition: color .12s, transform .12s; }
    .star:hover  { transform: scale(1.15); }
    .star.filled { color: #ffb400; }
    .feedback-comment {
      border: 1px solid #ddd; border-radius: 6px; padding: .6em .9em;
      font-size: 0.85rem; resize: vertical; outline: none; min-height: 52px;
      font-family: inherit; line-height: 1.55; transition: border-color .15s;
    }
    .feedback-comment:focus { border-color: #4f7ef7; }
    .feedback-action { display: flex; align-items: center; gap: 1rem; }
  </style>
</head>
<body>

<header>
  <h1>Agent 对话</h1>
  <span class="tag">提取关键词 → 混合检索 → 流式生成</span>
  <nav class="topnav">
    <a href="/admin/knowledge">知识库管理</a>
    <a href="/admin/chat" class="active">Agent 对话</a>
    <a href="/admin/users">用户管理</a>
    <a href="#" id="btn-logout">退出登录</a>
  </nav>
</header>
<script>
  document.getElementById('btn-logout').addEventListener('click', async e => {
    e.preventDefault();
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  });
</script>

<main>
  <!-- ── 会话侧栏 ────────────────────────────────────────────── -->
  <div class="conv-sidebar">
    <div class="conv-sidebar-top">
      <button class="new-conv-btn" id="btnNewConv">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新对话
      </button>
    </div>
    <div class="conv-list" id="convList">
      <div class="conv-empty">暂无对话历史<br>点击「新对话」开始</div>
    </div>
  </div>

  <!-- ── 主对话区 ────────────────────────────────────────────── -->
  <div class="chat-main">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-title" id="chatTitle">新对话</div>
        <div class="chat-header-sub" id="chatSub">选择左侧对话或新建对话开始</div>
      </div>
    </div>

    <div class="chat-msgs" id="chatMsgs">
      <div class="chat-hint" id="chatHint">
        与 Agent 对话，它会自动检索知识库后回答<br>
        <small style="opacity:.6">知识库需先在「知识库管理」页面完成清洗入库</small>
      </div>
    </div>

    <div class="chat-footer">
      <div class="param-row">
        <label>Top K</label>
        <input type="range" id="c_tk" min="1" max="20" step="1" value="5">
        <span class="val" id="cv_tk">5</span>
      </div>
      <div class="chat-input-row">
        <textarea id="chatInput" rows="2" placeholder="输入消息，Enter 发送（Shift+Enter 换行）…"></textarea>
        <button class="btn" id="chatBtn">发送</button>
      </div>
      <div class="status" id="chatStatus"></div>

      <div class="feedback-panel">
        <div class="feedback-title">
          对话反馈
          <small>打分后，本轮对话将被总结清洗，写入 wiki/ 增强知识库</small>
        </div>
        <div class="stars" id="stars">
          <span class="star" data-n="1">★</span>
          <span class="star" data-n="2">★</span>
          <span class="star" data-n="3">★</span>
          <span class="star" data-n="4">★</span>
          <span class="star" data-n="5">★</span>
        </div>
        <textarea class="feedback-comment" id="feedbackComment" rows="2"
                  placeholder="评语（选填）— 可指出助手回答错误的地方，或补充正确信息…"></textarea>
        <div class="feedback-action">
          <button class="btn" id="feedbackBtn" onclick="submitFeedback()">提交反馈并入 wiki 库</button>
          <div class="status" id="feedbackStatus"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
'use strict';

// ── 工具 ─────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setStatus(el, msg, cls = '') {
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}
function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(iso) {
  const d = new Date(iso), n = new Date();
  const diff = (n - d) / 1000;
  if (diff < 60)          return '刚刚';
  if (diff < 3600)        return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400)       return Math.floor(diff / 3600) + ' 小时前';
  if (diff < 86400 * 7)  return Math.floor(diff / 86400) + ' 天前';
  return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
}

document.getElementById('c_tk').addEventListener('input', function () {
  document.getElementById('cv_tk').textContent = this.value;
});

// ── 会话管理 ─────────────────────────────────────────────────────
const convListEl = document.getElementById('convList');
let convId = null;
let chatHistory = [];

async function loadConvList() {
  try {
    const r = await fetch('/conversations');
    if (!r.ok) return;
    const { items } = await r.json();
    if (!items || !items.length) {
      convListEl.innerHTML = '<div class="conv-empty">暂无对话历史<br>点击「新对话」开始</div>';
      return;
    }

    const today     = new Date(); today.setHours(0,0,0,0);
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    const lastWeek  = new Date(today); lastWeek.setDate(today.getDate() - 7);
    const groups = { today: [], yesterday: [], week: [], earlier: [] };
    for (const item of items) {
      const d = new Date(item.updated_at);
      if (d >= today)           groups.today.push(item);
      else if (d >= yesterday)  groups.yesterday.push(item);
      else if (d >= lastWeek)   groups.week.push(item);
      else                      groups.earlier.push(item);
    }

    const labels = { today: '今天', yesterday: '昨天', week: '最近 7 天', earlier: '更早' };
    let html = '';
    for (const [key, label] of Object.entries(labels)) {
      if (!groups[key].length) continue;
      html += `<div class="conv-group-label">${label}</div>`;
      for (const item of groups[key]) {
        const active = item.id === convId ? ' active' : '';
        html += `
          <div class="conv-item${active}" data-id="${item.id}" onclick="switchConversation('${item.id}')">
            <div class="conv-item-info">
              <div class="conv-item-title" title="${esc(item.title)}">${esc(item.title)}</div>
              <div class="conv-item-date">${fmtDate(item.updated_at)}</div>
            </div>
            <div class="conv-item-actions">
              <button class="conv-action-btn" title="重命名"
                onclick="event.stopPropagation();startRename('${item.id}',this)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="conv-action-btn del" title="删除"
                onclick="event.stopPropagation();deleteConversation('${item.id}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              </button>
            </div>
          </div>`;
      }
    }
    convListEl.innerHTML = html;
  } catch { /* 静默失败 */ }
}

function startNewConversation() {
  convId = null;
  chatHistory = [];
  currentRating = 0;
  paintStars(0);
  document.getElementById('feedbackComment').value = '';
  setStatus(document.getElementById('feedbackStatus'), '');
  setStatus(document.getElementById('chatStatus'), '');

  chatMsgs.innerHTML = '';
  const hint = document.createElement('div');
  hint.className = 'chat-hint';
  hint.id = 'chatHint';
  hint.innerHTML = '与 Agent 对话，它会自动检索知识库后回答<br><small style="opacity:.6">知识库需先在「知识库管理」页面完成清洗入库</small>';
  chatMsgs.appendChild(hint);

  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.getElementById('chatTitle').textContent = '新对话';
  document.getElementById('chatSub').textContent = '选择左侧对话或新建对话开始';
}

document.getElementById('btnNewConv').addEventListener('click', () => {
  startNewConversation();
});

async function switchConversation(id) {
  if (id === convId) return;
  try {
    const r = await fetch(`/conversations/${id}`);
    if (!r.ok) return;
    const conv = await r.json();

    convId = id;
    chatHistory = [];
    currentRating = 0;
    paintStars(0);
    document.getElementById('feedbackComment').value = '';
    setStatus(document.getElementById('feedbackStatus'), '');
    setStatus(document.getElementById('chatStatus'), '');

    chatMsgs.innerHTML = '';
    const msgs = conv.messages || [];
    if (msgs.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'chat-hint';
      hint.textContent = '对话内容为空，发送第一条消息开始';
      chatMsgs.appendChild(hint);
    } else {
      for (const m of msgs) {
        if (m.role === 'user') {
          const wrap = document.createElement('div');
          wrap.className = 'msg-wrap user';
          wrap.innerHTML = `<div class="bubble">${esc(m.content)}</div><div class="msg-time">${now()}</div>`;
          chatMsgs.appendChild(wrap);
        } else {
          const wrap = document.createElement('div');
          wrap.className = 'msg-wrap assistant';
          wrap.innerHTML = `<div class="bubble">${esc(m.content)}</div><div class="msg-time">${now()}</div>`;
          chatMsgs.appendChild(wrap);
        }
        chatHistory.push({ role: m.role, content: m.content });
      }
    }
    chatMsgs.scrollTop = chatMsgs.scrollHeight;

    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });
    document.getElementById('chatTitle').textContent = conv.title || '对话';
    document.getElementById('chatSub').textContent =
      `共 ${msgs.length} 条消息${conv.has_summary ? ' · 含历史摘要' : ''}`;
  } catch { /* 静默失败 */ }
}

async function deleteConversation(id) {
  if (!confirm('确认删除此对话？')) return;
  try {
    const r = await fetch(`/conversations/${id}`, { method: 'DELETE' });
    if (!r.ok) return;
    if (id === convId) startNewConversation();
    loadConvList();
  } catch { /* 静默失败 */ }
}

function startRename(id, btn) {
  const item = btn.closest('.conv-item');
  const titleEl = item.querySelector('.conv-item-title');
  const oldTitle = titleEl.textContent;
  const inp = document.createElement('input');
  inp.className = 'conv-rename-input';
  inp.value = oldTitle;
  titleEl.replaceWith(inp);
  inp.focus(); inp.select();

  async function doRename() {
    const newTitle = inp.value.trim();
    inp.replaceWith(titleEl);
    if (!newTitle || newTitle === oldTitle) return;
    try {
      const r = await fetch(`/conversations/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle }),
      });
      if (r.ok) {
        titleEl.textContent = newTitle;
        if (id === convId) document.getElementById('chatTitle').textContent = newTitle;
      }
    } catch { /* 静默失败 */ }
  }
  inp.addEventListener('blur', doRename);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); inp.blur(); }
    if (e.key === 'Escape') { inp.replaceWith(titleEl); }
  });
}

// ── Agent 对话 ───────────────────────────────────────────────────
const chatMsgs  = document.getElementById('chatMsgs');
const chatInput = document.getElementById('chatInput');
const chatBtn   = document.getElementById('chatBtn');
const chatStat  = document.getElementById('chatStatus');

let isStreaming = false;

function appendUserMsg(text) {
  document.getElementById('chatHint')?.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  wrap.innerHTML = `<div class="bubble">${esc(text)}</div><div class="msg-time">${now()}</div>`;
  chatMsgs.appendChild(wrap);
  scrollChat();
}

function appendToolBadge(text, cls = '') {
  const badge = document.createElement('div');
  badge.className = 'tool-badge' + (cls ? ' ' + cls : '');
  badge.textContent = text;
  chatMsgs.appendChild(badge);
  scrollChat();
  return badge;
}

function beginAssistantMsg() {
  document.getElementById('chatHint')?.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap assistant';
  const bubble = document.createElement('div');
  bubble.className = 'bubble cursor';
  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now();
  wrap.appendChild(bubble);
  wrap.appendChild(time);
  chatMsgs.appendChild(wrap);
  scrollChat();
  return bubble;
}

function finalizeAssistantBubble(bubble, fullText) {
  bubble.classList.remove('cursor');
  if (fullText) bubble.textContent = fullText;
}

function scrollChat() { chatMsgs.scrollTop = chatMsgs.scrollHeight; }

async function sendChat() {
  const text = chatInput.value.trim();
  if (!text || isStreaming) return;

  isStreaming = true;
  chatInput.value = '';
  chatBtn.disabled = true;
  setStatus(chatStat, 'Agent 思考中…', 'ing');
  appendUserMsg(text);

  let assistantBubble = null;
  let fullReply = '';
  let toolBadge = null;

  try {
    const resp = await fetch('/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        conversation_id: convId || undefined,
        top_k: +document.getElementById('c_tk').value,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      setStatus(chatStat, '错误: ' + (err.error || resp.statusText), 'err');
      return;
    }

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        let evt; try { evt = JSON.parse(line.slice(5).trim()); } catch { continue; }

        if (evt.type === 'token') {
          if (!assistantBubble) assistantBubble = beginAssistantMsg();
          fullReply += evt.text || '';
          assistantBubble.textContent = fullReply;
          scrollChat();

        } else if (evt.type === 'tool_start') {
          let label;
          if (evt.name === '提取关键词') {
            label = '✏️ 提取关键词…'; setStatus(chatStat, '提取关键词…', 'ing');
          } else if (evt.name === '检索知识库') {
            const kw = evt.keywords ? ` 「${esc(evt.keywords)}」` : '';
            label = `🔍 检索知识库${kw}…`; setStatus(chatStat, '检索知识库…', 'ing');
          } else { label = `🔧 ${esc(evt.name)}…`; }
          toolBadge = appendToolBadge(label);

        } else if (evt.type === 'tool_end') {
          if (toolBadge) {
            toolBadge.className = 'tool-badge result';
            if (evt.name === '提取关键词')     toolBadge.textContent = `✓ 关键词：${evt.keywords || '(空)'}`;
            else if (evt.name === '检索知识库') toolBadge.textContent = `✓ 找到 ${evt.count} 个相关片段`;
            else                               toolBadge.textContent = `✓ ${evt.name} 完成`;
          }
          toolBadge = null;
          setStatus(chatStat, '生成回答…', 'ing');

        } else if (evt.type === 'done') {
          const reply = evt.full_text || fullReply;
          if (assistantBubble) finalizeAssistantBubble(assistantBubble, reply);
          chatHistory.push({ role: 'user', content: text });
          chatHistory.push({ role: 'assistant', content: reply });
          setStatus(chatStat, `✓ 完成（共 ${chatHistory.length / 2} 轮）`, 'ok');

        } else if (evt.type === 'conversation_saved') {
          const isNew = !convId;
          convId = evt.conversation_id;
          document.getElementById('chatTitle').textContent = evt.title || '对话';
          if (isNew) document.getElementById('chatSub').textContent = '对话进行中';
          loadConvList();

        } else if (evt.type === 'error') {
          if (assistantBubble) finalizeAssistantBubble(assistantBubble, '');
          setStatus(chatStat, 'Agent 错误: ' + evt.message, 'err');
        }
      }
    }
  } catch(e) {
    setStatus(chatStat, '请求失败: ' + e.message, 'err');
  } finally {
    isStreaming = false;
    chatBtn.disabled = false;
    chatInput.focus();
  }
}

chatBtn.addEventListener('click', sendChat);
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// ── 对话反馈 ──────────────────────────────────────────────────────
const feedbackBtn     = document.getElementById('feedbackBtn');
const feedbackStat    = document.getElementById('feedbackStatus');
const feedbackComment = document.getElementById('feedbackComment');
const starEls         = document.querySelectorAll('#stars .star');
let currentRating = 0;

function paintStars(n) {
  const display = n || currentRating;
  starEls.forEach((s, i) => s.classList.toggle('filled', i < display));
}
starEls.forEach(s => {
  const n = +s.dataset.n;
  s.addEventListener('mouseenter', () => paintStars(n));
  s.addEventListener('mouseleave', () => paintStars(0));
  s.addEventListener('click',      () => { currentRating = n; paintStars(0); });
});

async function submitFeedback() {
  if (!currentRating)      { setStatus(feedbackStat, '请先选择评分（1-5 星）', 'err'); return; }
  if (!chatHistory.length) { setStatus(feedbackStat, '暂无对话历史可供反馈', 'err'); return; }
  if (isStreaming)         { setStatus(feedbackStat, '请等待当前对话完成', 'err'); return; }

  feedbackBtn.disabled = true;
  setStatus(feedbackStat, '总结清洗中…', 'ing');

  try {
    const resp = await fetch('/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        rating: currentRating,
        comment: feedbackComment.value.trim(),
        history: chatHistory,
        conversation_id: convId || '',
      }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      setStatus(feedbackStat, '错误: ' + (err.error || resp.statusText), 'err');
      return;
    }

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        let evt; try { evt = JSON.parse(line.slice(5).trim()); } catch { continue; }
        if (evt.type === 'status') {
          setStatus(feedbackStat, evt.message, 'ing');
        } else if (evt.type === 'result') {
          if (evt.filename) setStatus(feedbackStat, `✓ 已写入 wiki/${evt.filename}（${evt.raw_len} → ${evt.clean_len} 字）`, 'ok');
          else              setStatus(feedbackStat, '✓ ' + (evt.message || '无可保留内容'), 'ok');
          currentRating = 0; paintStars(0); feedbackComment.value = '';
        } else if (evt.type === 'error') {
          setStatus(feedbackStat, '失败: ' + evt.message, 'err');
        }
      }
    }
  } catch(e) {
    setStatus(feedbackStat, '请求失败: ' + e.message, 'err');
  } finally {
    feedbackBtn.disabled = false;
  }
}

// 初始化
loadConvList();
</script>
