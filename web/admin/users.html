<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 · 销售 Agent</title>
  <link rel="stylesheet" href="/assets/common.css">
  <style>
    /* ── 表格 ───────────────────────────────────────────────────────────────── */
    .users-wrap { padding: 1.6rem 2rem; }
    .users-toolbar {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem;
    }
    .users-toolbar h2 { font-size: 1rem; font-weight: 700; color: #333; flex: 1 1 0; min-width: 0; }
    .search-box {
      border: 1px solid #e0e0e0; border-radius: 6px; padding: .38em .8em;
      font-size: 0.86rem; width: 14rem; outline: none; transition: border-color .15s;
    }
    .search-box:focus { border-color: #4f7ef7; }

    .user-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .user-table th {
      text-align: left; padding: .55em .8em; background: #f5f6fa; color: #888;
      font-weight: 600; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: .04em; border-bottom: 1px solid #eee;
    }
    .user-table td { padding: .7em .8em; border-bottom: 1px solid #f0f0f0; vertical-align: middle; color: #333; }
    .user-table tr:hover td { background: #fafbff; }

    .badge-banned { display: inline-block; padding: .18em .7em; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: #fde8e8; color: #e53e3e; }
    .badge-normal { display: inline-block; padding: .18em .7em; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: #e6f4ea; color: #2e7d32; }
    .badge-custom { display: inline-block; padding: .18em .7em; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: #eef2ff; color: #4f7ef7; }
    .badge-default { display: inline-block; padding: .18em .7em; border-radius: 12px; font-size: 0.75rem; font-weight: 600; background: #f5f5f5; color: #aaa; }

    .action-row { display: flex; gap: .5rem; flex-wrap: wrap; }
    .btn-sm { padding: .28em .75em; border-radius: 5px; font-size: 0.78rem; border: none; cursor: pointer; font-weight: 600; transition: opacity .12s; flex-shrink: 0; }
    .btn-sm:hover { opacity: .82; }
    .btn-edit   { background: #eef2ff; color: #4f7ef7; }
    .btn-model  { background: #f0fdf4; color: #2e7d32; }
    .btn-ban    { background: #fff3cd; color: #b45309; }
    .btn-unban  { background: #e6f4ea; color: #2e7d32; }
    .btn-delete { background: #fde8e8; color: #e53e3e; }

    .empty-tip { text-align: center; padding: 3rem; color: #bbb; font-size: 0.9rem; }

    /* ── 基础编辑弹窗 ────────────────────────────────────────────────────────── */
    .modal-mask {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.35); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-mask.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 2rem 2.2rem;
      width: 26rem; max-width: 94vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem; color: #222; }
    .modal-field { margin-bottom: .9rem; }
    .modal-field label { display: block; font-size: 0.8rem; color: #666; margin-bottom: .28rem; font-weight: 600; }
    .modal-field input {
      width: 100%; box-sizing: border-box; border: 1px solid #ddd;
      border-radius: 6px; padding: .45em .75em; font-size: 0.88rem;
      outline: none; transition: border-color .15s;
    }
    .modal-field input:focus { border-color: #4f7ef7; }
    .modal-field .hint { font-size: 0.75rem; color: #aaa; margin-top: .25rem; }
    .modal-footer { display: flex; gap: .7rem; justify-content: flex-end; margin-top: 1.4rem; }
    .modal-err { color: #e53e3e; font-size: 0.82rem; margin-top: .5rem; min-height: 1.1em; }
    .btn-primary { padding: .5em 1.4em; border-radius: 6px; border: none; background: #4f7ef7; color: #fff; font-weight: 700; font-size: 0.88rem; cursor: pointer; }
    .btn-primary:hover { background: #3a6be0; }
    .btn-cancel { padding: .5em 1.2em; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #555; font-weight: 600; font-size: 0.88rem; cursor: pointer; }
    .btn-cancel:hover { background: #f5f5f5; }

    /* ── 模型配置弹窗 ────────────────────────────────────────────────────────── */
    .model-modal-box {
      position: relative;
      background: #fff;
      border-radius: 12px;
      width: 580px;
      max-width: calc(100vw - 32px);
      height: 700px;
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      box-shadow: 0 12px 48px rgba(0,0,0,.24);
      overflow: hidden;
    }
    .model-modal-head {
      padding: 20px 28px 14px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .model-modal-head h3 { font-size: 16px; font-weight: 700; color: #222; margin: 0; }
    .model-modal-head .sub { font-size: 12px; color: #aaa; margin-top: 3px; }

    .model-modal-body {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      padding: 20px 28px 8px;
    }

    .model-modal-foot {
      padding: 12px 28px 16px;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .model-modal-foot .foot-status {
      flex: 1 1 0;
      min-width: 0;
      font-size: 12px;
      color: #888;
    }

    /* 各 section */
    .ms-section { margin-bottom: 24px; }
    .ms-section:last-child { margin-bottom: 0; }
    .ms-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #aaa;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid #f0f0f0;
    }

    /* 子段 */
    .ms-subsection { margin-bottom: 20px; }
    .ms-sub-head { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .ms-sub-head h4 { font-size: 13px; font-weight: 700; color: #333; margin: 0; }
    .ms-hint { font-size: 11px; color: #aaa; margin-bottom: 10px; line-height: 1.6; }
    .ms-field { margin-bottom: 8px; }
    .ms-field label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; font-weight: 600; }
    .ms-field input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      min-width: 0;
    }
    .ms-field input:focus { border-color: #4f7ef7; }

    /* 状态圆点 */
    .ms-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: #d0d3da; flex-shrink: 0; display: inline-block;
      transition: background .2s;
    }
    .ms-dot.ok  { background: #2cc36b; }
    .ms-dot.err { background: #e55353; }
    .ms-dot.ing { background: #4f7ef7; animation: dot-pulse .9s ease-in-out infinite; }
    @keyframes dot-pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .btn-test {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #f5f6fa;
      color: #555;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-test:hover { background: #eef2ff; border-color: #4f7ef7; color: #4f7ef7; }
  </style>
</head>
<body>
<header>
  <h1>销售 Agent</h1>
  <span class="tag">管理员</span>
  <nav class="topnav">
    <a href="/admin/knowledge">知识库管理</a>
    <a href="/admin/chat">Agent 对话</a>
    <a href="/admin/users" class="active">用户管理</a>
    <a href="#" id="btn-logout">退出登录</a>
  </nav>
</header>

<main>
  <section class="panel-full">
    <div class="users-wrap">
      <div class="users-toolbar">
        <h2>用户列表</h2>
        <input class="search-box" id="searchInput" type="text" placeholder="搜索用户名 / 手机 / 部门…">
        <button class="btn" id="btnRefresh">刷新</button>
      </div>
      <table class="user-table" id="userTable">
        <thead>
          <tr>
            <th>用户名</th>
            <th>手机</th>
            <th>部门</th>
            <th>专属模型</th>
            <th>状态</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userBody"></tbody>
      </table>
      <div class="empty-tip" id="emptyTip" style="display:none">暂无用户数据</div>
    </div>
  </section>
</main>

<!-- ── 基础编辑弹窗 ─────────────────────────────────────────────────────────── -->
<div class="modal-mask" id="editModal">
  <div class="modal-box">
    <h3>编辑用户</h3>
    <input type="hidden" id="editUid">
    <div class="modal-field">
      <label>用户名</label>
      <input type="text" id="editUsername" disabled>
    </div>
    <div class="modal-field">
      <label>新密码</label>
      <input type="password" id="editPassword" placeholder="留空则不修改">
      <div class="hint">至少 6 位，留空保持原密码不变</div>
    </div>
    <div class="modal-field">
      <label>手机号</label>
      <input type="text" id="editPhone" maxlength="11">
    </div>
    <div class="modal-field">
      <label>部门</label>
      <input type="text" id="editDept">
    </div>
    <div class="modal-err" id="editErr"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="editCancel">取消</button>
      <button class="btn-primary" id="editSave">保存</button>
    </div>
  </div>
</div>

<!-- ── 模型配置大弹窗 ──────────────────────────────────────────────────────── -->
<div class="modal-mask" id="modelModal">
  <div class="model-modal-box">
    <div class="model-modal-head">
      <h3>专属模型配置</h3>
      <div class="sub" id="modelModalSub">用户：—</div>
    </div>
    <div class="model-modal-body" id="modelModalBody">
      <!-- 动态生成 -->
    </div>
    <div class="model-modal-foot">
      <span class="foot-status" id="modelStatus"></span>
      <button class="btn-test" id="modelTest">测试连通</button>
      <button class="btn-cancel" id="modelCancel">取消</button>
      <button class="btn-primary" id="modelSave">保存</button>
    </div>
  </div>
</div>

<script src="/assets/settings.js" defer></script>
<script>
// ── 退出登录 ──────────────────────────────────────────────────────────────────
document.getElementById('btn-logout').addEventListener('click', async e => {
  e.preventDefault();
  await fetch('/auth/logout', { method: 'POST' });
  window.location.href = '/';
});

// ── 工具 ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 数据 ──────────────────────────────────────────────────────────────────────
let _users = [];

async function loadUsers() {
  const tbody = document.getElementById('userBody');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#aaa;padding:2rem">加载中…</td></tr>';
  document.getElementById('emptyTip').style.display = 'none';
  const res = await fetch('/users');
  if (!res.ok) { tbody.innerHTML = ''; return; }
  const data = await res.json();
  _users = data.users || [];
  renderTable(_users);
}

function renderTable(rows) {
  const tbody = document.getElementById('userBody');
  const empty = document.getElementById('emptyTip');
  if (!rows.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  tbody.innerHTML = rows.map(u => `
    <tr data-uid="${u.id}">
      <td><strong>${esc(u.username)}</strong></td>
      <td>${esc(u.phone || '—')}</td>
      <td>${esc(u.department || '—')}</td>
      <td>${u.has_custom_settings
        ? `<span class="badge-custom">${esc(u.chat_model || '已配置')}</span>`
        : '<span class="badge-default">系统默认</span>'}</td>
      <td>${u.is_banned
        ? '<span class="badge-banned">已封禁</span>'
        : '<span class="badge-normal">正常</span>'}</td>
      <td>${esc(u.created_at || '')}</td>
      <td>
        <div class="action-row">
          <button class="btn-sm btn-edit"  onclick="openEdit(${u.id})">编辑</button>
          <button class="btn-sm btn-model" onclick="openModel(${u.id})">专属模型</button>
          ${u.is_banned
            ? `<button class="btn-sm btn-unban" onclick="toggleBan(${u.id},false)">解封</button>`
            : `<button class="btn-sm btn-ban"   onclick="toggleBan(${u.id},true)">封号</button>`}
          <button class="btn-sm btn-delete" onclick="deleteUser(${u.id},'${esc(u.username)}')">删除</button>
        </div>
      </td>
    </tr>`).join('');
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderTable(_users); return; }
  renderTable(_users.filter(u =>
    u.username.toLowerCase().includes(q) ||
    (u.phone || '').includes(q) ||
    (u.department || '').toLowerCase().includes(q)
  ));
});
document.getElementById('btnRefresh').addEventListener('click', loadUsers);

// ── 封号 / 解封 ───────────────────────────────────────────────────────────────
async function toggleBan(uid, ban) {
  if (!confirm(`确定要${ban ? '封禁' : '解封'}该用户吗？`)) return;
  const res = await fetch(`/users/${uid}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ is_banned: ban }),
  });
  const data = await res.json();
  if (!res.ok) { alert(data.error || '操作失败'); return; }
  loadUsers();
}

// ── 删除 ──────────────────────────────────────────────────────────────────────
async function deleteUser(uid, name) {
  if (!confirm(`确定要删除用户「${name}」吗？此操作不可恢复。`)) return;
  const res = await fetch(`/users/${uid}`, { method: 'DELETE' });
  const data = await res.json();
  if (!res.ok) { alert(data.error || '删除失败'); return; }
  loadUsers();
}

// ── 基础编辑弹窗 ──────────────────────────────────────────────────────────────
function openEdit(uid) {
  const u = _users.find(x => x.id === uid);
  if (!u) return;
  document.getElementById('editUid').value      = u.id;
  document.getElementById('editUsername').value = u.username;
  document.getElementById('editPassword').value = '';
  document.getElementById('editPhone').value    = u.phone || '';
  document.getElementById('editDept').value     = u.department || '';
  document.getElementById('editErr').textContent = '';
  document.getElementById('editModal').classList.add('open');
}
document.getElementById('editCancel').addEventListener('click', () =>
  document.getElementById('editModal').classList.remove('open'));
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal'))
    document.getElementById('editModal').classList.remove('open');
});
document.getElementById('editSave').addEventListener('click', async () => {
  const uid   = document.getElementById('editUid').value;
  const pwd   = document.getElementById('editPassword').value;
  const phone = document.getElementById('editPhone').value.trim();
  const dept  = document.getElementById('editDept').value.trim();
  const errEl = document.getElementById('editErr');
  errEl.textContent = '';
  if (pwd && pwd.length < 6) { errEl.textContent = '密码不能少于 6 位'; return; }
  if (phone && !/^1[3-9]\d{9}$/.test(phone)) { errEl.textContent = '手机号格式不正确'; return; }
  const body = { phone, department: dept };
  if (pwd) body.password = pwd;
  const res = await fetch(`/users/${uid}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) { errEl.textContent = data.error || '保存失败'; return; }
  document.getElementById('editModal').classList.remove('open');
  loadUsers();
});

// ── 模型配置弹窗 ──────────────────────────────────────────────────────────────
const MODEL_SECTIONS = [
  {
    title: 'Chat',
    groups: [
      { key: 'chat',    label: 'Chat Model',      hint: '对话主模型。API Key 留空则继承系统设置。' },
      { key: 'cleaner', label: 'AI 清洗',          hint: '用于资料摘要与反馈整理。留空继承 Chat。' },
    ],
  },
  {
    title: 'Knowledge',
    groups: [
      { key: 'embedding', label: 'Embedding Model', hint: '向量化模型。留空继承系统设置。⚠ 换模型后需清空向量库。' },
      { key: 'reranker',  label: 'Rerank Model',    hint: '检索重排序模型。留空继承系统设置。' },
    ],
  },
];

let _modelUid = null;

function buildModelBody(masked) {
  const body = document.getElementById('modelModalBody');
  body.innerHTML = '';
  for (const sec of MODEL_SECTIONS) {
    const secDiv = document.createElement('div');
    secDiv.className = 'ms-section';
    const secTitle = document.createElement('div');
    secTitle.className = 'ms-section-title';
    secTitle.textContent = sec.title;
    secDiv.appendChild(secTitle);

    for (const g of sec.groups) {
      const m = masked[g.key] || {};
      const sub = document.createElement('div');
      sub.className = 'ms-subsection';

      const subHead = document.createElement('div');
      subHead.className = 'ms-sub-head';
      const dot = document.createElement('span');
      dot.className = 'ms-dot';
      dot.id = `mdot-${g.key}`;
      const h4 = document.createElement('h4');
      h4.textContent = g.label;
      subHead.appendChild(dot);
      subHead.appendChild(h4);
      sub.appendChild(subHead);

      const hint = document.createElement('div');
      hint.className = 'ms-hint';
      hint.textContent = g.hint;
      sub.appendChild(hint);

      // api_key
      const fKey = document.createElement('div');
      fKey.className = 'ms-field';
      fKey.innerHTML = `<label>API Key</label><input type="password" id="mf-${g.key}-api_key" data-sec="${g.key}" data-field="api_key" placeholder="${m.api_key_set ? '（已设置，留空保留原值）' : '留空继承系统设置'}">`;
      sub.appendChild(fKey);

      // base_url
      const fUrl = document.createElement('div');
      fUrl.className = 'ms-field';
      fUrl.innerHTML = `<label>Base URL</label><input type="text" id="mf-${g.key}-base_url" data-sec="${g.key}" data-field="base_url" value="${esc(m.base_url || '')}">`;
      sub.appendChild(fUrl);

      // model_name
      const fModel = document.createElement('div');
      fModel.className = 'ms-field';
      fModel.innerHTML = `<label>Model Name</label><input type="text" id="mf-${g.key}-model_name" data-sec="${g.key}" data-field="model_name" value="${esc(m.model_name || '')}">`;
      sub.appendChild(fModel);

      secDiv.appendChild(sub);
    }
    body.appendChild(secDiv);
  }
}

function collectModelForm() {
  const payload = {};
  const inputs = document.querySelectorAll('#modelModalBody input[data-sec]');
  for (const inp of inputs) {
    const sec = inp.dataset.sec;
    const field = inp.dataset.field;
    if (!payload[sec]) payload[sec] = {};
    payload[sec][field] = inp.value;
  }
  return payload;
}

function setDots(state) {
  const secs = ['chat','cleaner','embedding','reranker'];
  for (const s of secs) {
    const d = document.getElementById(`mdot-${s}`);
    if (d) { d.className = 'ms-dot'; if (state) d.classList.add(state); }
  }
}

function applyTestResults(results) {
  for (const [sec, r] of Object.entries(results)) {
    const d = document.getElementById(`mdot-${sec}`);
    if (!d) continue;
    d.className = 'ms-dot ' + (r.ok ? 'ok' : 'err');
    d.title = r.ok ? `✓ ${r.latency_ms}ms` : r.error;
  }
}

async function openModel(uid) {
  _modelUid = uid;
  const u = _users.find(x => x.id === uid);
  document.getElementById('modelModalSub').textContent = `用户：${u ? u.username : uid}`;
  document.getElementById('modelStatus').textContent = '';
  setDots('');

  // 先显示弹窗、body 显示加载中
  document.getElementById('modelModalBody').innerHTML = '<div style="padding:2rem;text-align:center;color:#aaa">加载中…</div>';
  document.getElementById('modelModal').classList.add('open');

  const res = await fetch(`/users/${uid}/settings`);
  if (!res.ok) {
    document.getElementById('modelModalBody').innerHTML = '<div style="color:red;padding:1rem">加载失败</div>';
    return;
  }
  const data = await res.json();
  buildModelBody(data.settings || {});
}

document.getElementById('modelCancel').addEventListener('click', () =>
  document.getElementById('modelModal').classList.remove('open'));
document.getElementById('modelModal').addEventListener('click', e => {
  if (e.target === document.getElementById('modelModal'))
    document.getElementById('modelModal').classList.remove('open');
});

document.getElementById('modelTest').addEventListener('click', async () => {
  if (_modelUid === null) return;
  const payload = collectModelForm();
  setDots('ing');
  document.getElementById('modelStatus').textContent = '测试中…';
  const res = await fetch(`/users/${_modelUid}/settings/test`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) {
    setDots('err');
    document.getElementById('modelStatus').textContent = data.error || '测试失败';
    return;
  }
  applyTestResults(data.results);
  const allOk = Object.values(data.results).every(r => r.ok);
  document.getElementById('modelStatus').textContent = allOk ? '全部连通 ✓' : '部分连通失败，查看圆点 tooltip';
});

document.getElementById('modelSave').addEventListener('click', async () => {
  if (_modelUid === null) return;
  const payload = collectModelForm();
  document.getElementById('modelStatus').textContent = '保存中…';
  const res = await fetch(`/users/${_modelUid}/settings`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok) {
    document.getElementById('modelStatus').textContent = data.error || '保存失败';
    return;
  }
  document.getElementById('modelModal').classList.remove('open');
  loadUsers();
});

// ── 初始化 ────────────────────────────────────────────────────────────────────
loadUsers();
</script>
</body>
</html>
